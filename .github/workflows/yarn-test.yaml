name: "Yarn Pull Request Tests v3"

# Release Notes v3
#   based on cdk-test but does more than just test cdk so renamed yarn-test
#   Runs CDK Nag instead of CFN Nag - if CDK Nag is enabled for the target
#   Run Jest Unit Tests (no environment)
#   Run Jest Integration Tests (against provided environment) if INTEGRATION_TEST_ENVIRONENT is provided

on:
  workflow_call:
    inputs:
    
      AWS_REGION:
        type: string
        required: true

      CDK_FOLDER_NAME:
        type: string
        required: true

      INTEGRATION_TEST_ENVIRONENT:
        type: string
        required: false

      SAML_AWS_ROLE_ARN:
        type: string
        required: true
      
      USES_SONAR_CLOUD:
        type: boolean
        required: false

    secrets:
      # only required if using USES_SONAR_CLOUD = true
      SONAR_TOKEN:
        required: false

jobs:

  cdk-test:

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - uses: saml-to/assume-aws-role@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          role: ${{ inputs.SAML_AWS_ROLE_ARN }}
          region: ${{ inputs.AWS_REGION }}
          provider: awsProduction

        # this registry to be replaced with github packages
      - name: Yarn Registry
        env:
          CODE_ARTIFACT_ACCOUNT: 746354538204
          CODE_ARTIFACT_REGION: us-east-2
          CODE_ARTIFACT_URL: https://prod-yarn-746354538204.d.codeartifact.us-east-2.amazonaws.com/npm/prod-torus-common/
        run: |
          # still call this even though using role?
          aws codeartifact login --tool npm --repository prod-torus-common --domain prod-yarn --domain-owner ${{ env.CODE_ARTIFACT_ACCOUNT }} --region ${{ env.CODE_ARTIFACT_REGION }}
          # setup yarn per https://docs.aws.amazon.com/codeartifact/latest/ug/npm-yarn.html
          yarn config set npmRegistryServer "${{ env.CODE_ARTIFACT_URL }}"
          # get token
          export CODEARTIFACT_AUTH_TOKEN=`aws codeartifact get-authorization-token --domain prod-yarn --domain-owner ${{ env.CODE_ARTIFACT_ACCOUNT }} --query authorizationToken --region ${{ env.CODE_ARTIFACT_REGION }} --output text` 
          # still required for auth
          echo "always-auth=true" >> ~/.npmrc
          echo "yarn config!"
          # test
          yarn config list

      - name: Yarn Install
        run: |
          yarn install

      - name: Yarn Build
        run: |
          yarn build

      - name: Yarn Unit Test
        run: |
          yarn pipeline:test-unit

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        if: "${{ inputs.USES_SONAR_CLOUD != '' }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Needed to get PR information, if any
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: CDK Synth with CDK Nag
        run: |
          export CDK_PREFIX=pullrequest
          yarn synth


